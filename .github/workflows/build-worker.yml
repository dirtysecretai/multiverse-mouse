name: Build RunPod Worker

on:
  push:
    paths:
      - 'AI/runpod-worker/**'
      - 'AI/OneTrainer/OneTrainer/modules/modelLoader/flux/FluxModelLoader.py'
      - 'AI/OneTrainer/OneTrainer/flux1dev_transformer_config/**'
      - 'AI/OneTrainer/OneTrainer/flux1dev_vae_config/**'
      - '.github/workflows/build-worker.yml'
  workflow_dispatch:  # also allow manual trigger from GitHub UI

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: AI/runpod-worker
          file: AI/runpod-worker/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ot-worker:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ot-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
